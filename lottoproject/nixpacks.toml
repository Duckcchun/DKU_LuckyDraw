[phases.setup]
nixPkgs = ["python311", "gcc", "postgresql"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "python manage.py migrate && python create_superuser.py && gunicorn lottoproject.wsgi:application --bind 0.0.0.0:$PORT --workers 3"
