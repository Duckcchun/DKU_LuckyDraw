{% extends 'base.html' %}
{% block title %}로그인 - DKU 로또{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> 로그인</h4>
            </div>
            <div class="card-body">
                {% if form.errors %}
                <div class="alert alert-danger">
                    아이디 또는 비밀번호가 올바르지 않습니다.
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">사용자명</label>
                        <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">비밀번호</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-lotto w-100">로그인</button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    계정이 없으신가요? <a href="{% url 'signup' %}">회원가입</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
