[phases.setup]
nixPkgs = ["python311", "postgresql"]

[phases.install]
cmds = ["cd lottoproject && pip install -r requirements.txt"]

[phases.build]
cmds = ["cd lottoproject && python manage.py collectstatic --noinput 2>/dev/null || true"]

[start]
cmd = "cd lottoproject && python manage.py makemigrations lotto && python manage.py migrate && python create_superuser.py && gunicorn lottoproject.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
