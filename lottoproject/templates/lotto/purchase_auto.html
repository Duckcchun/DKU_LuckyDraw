{% extends 'base.html' %}
{% block title %}자동 구매 - DKU 로또{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="fas fa-random"></i> 자동번호 구매</h4>
            </div>
            <div class="card-body">
                <div class="text-center mb-4">
                    <h5>현재 <span class="text-primary">제 {{ current_round.round_number }}회</span></h5>
                    <p class="text-muted">컴퓨터가 자동으로 번호를 선택합니다.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4 text-center">
                        <label for="quantity" class="form-label fw-bold">구매 수량 (1~5장)</label>
                        <div class="d-flex justify-content-center align-items-center gap-2">
                            <button type="button" class="btn btn-outline-primary" onclick="changeQty(-1)">-</button>
                            <input type="number" name="quantity" id="quantity" class="form-control text-center" 
                                   value="1" min="1" max="5" style="width: 80px;">
                            <button type="button" class="btn btn-outline-primary" onclick="changeQty(1)">+</button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-lotto btn-lg w-100">
                        <i class="fas fa-shopping-cart"></i> 자동 구매하기
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function changeQty(delta) {
    const input = document.getElementById('quantity');
    let val = parseInt(input.value) + delta;
    if (val < 1) val = 1;
    if (val > 5) val = 5;
    input.value = val;
}
</script>
{% endblock %}
